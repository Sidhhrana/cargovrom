<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Drift Relay</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="game">
      <canvas id="scene"></canvas>

      <section class="menu" id="menu" aria-label="Race menu">
        <div class="menu-panel">
          <span id="raceStatus">Ready</span>
          <h1>Neon Drift Relay</h1>
          <p>Choose a circuit style, then race three laps against AI that adapts to corners and pace.</p>
          <div class="difficulty" role="radiogroup" aria-label="Difficulty">
            <label><input type="radio" name="difficulty" value="easy" checked /> Flow</label>
            <label><input type="radio" name="difficulty" value="pro" /> Pro</label>
            <label><input type="radio" name="difficulty" value="expert" /> Expert</label>
          </div>
          <div class="menu-actions">
            <button id="startRace" type="button">Generate & Race</button>
            <button id="restartRace" type="button">New Circuit</button>
          </div>
        </div>
      </section>

      <section class="hud hud-top" aria-label="Race status">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>NEON DRIFT RELAY</span>
        </div>
        <div class="meters">
          <div>
            <span class="label">Speed</span>
            <strong id="speed">000</strong>
          </div>
          <div>
            <span class="label">Position</span>
            <strong id="position">1/6</strong>
          </div>
          <div>
            <span class="label">Lap</span>
            <strong id="lap">1/3</strong>
          </div>
          <div>
            <span class="label">Score</span>
            <strong id="score">0</strong>
          </div>
        </div>
      </section>

      <canvas id="minimap" class="minimap" aria-label="Track map"></canvas>

      <section class="dashboard" aria-label="Driving dashboard">
        <div class="dash-gauge">
          <span>Speed</span>
          <i id="speedNeedle"></i>
          <strong><b id="dashSpeed">0</b> km/h</strong>
        </div>
        <div class="dash-gauge">
          <span>RPM</span>
          <i id="rpmNeedle"></i>
          <strong id="dashRpm">900</strong>
        </div>
        <div class="dash-pair">
          <span>Gear <b id="gear">1</b></span>
        </div>
        <div class="telemetry">
          <label>Gas <span><b id="throttleTrace"></b></span></label>
          <label>Brake <span><b id="brakeTrace"></b></span></label>
          <label>Grip <span><b id="gripTrace"></b></span></label>
        </div>
      </section>

      <section class="hud hud-bottom" aria-label="Controls and boost">
        <button id="menuButton" type="button">Menu</button>
        <div class="boost-shell">
          <div id="boostBar" class="boost-fill"></div>
        </div>
        <div class="controls">
          <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
          <span>or</span>
          <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd>
          <span>Shift boost</span>
          <span>Space handbrake</span>
        </div>
      </section>

      <output id="renderProbe" class="sr-only" aria-label="Render probe">pending</output>
      <output id="modelProbe" class="sr-only" aria-label="Model probe">pending</output>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
